name: Test & Deploy BobApp - Back
run-name: build, test, scan, and publish the backend

on:
  push:
    branches:
    - 'main'
  workflow_dispatch:

jobs:

  build-and-test:
    runs-on: ubuntu-latest
    steps:

      - name: Check out repository code
        uses: actions/checkout@v4.2.2
        # with:
        #   path: ${{ github.workspace }}

      - name: setup backend
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          architecture: x64
          cache: maven

      - name: test backend
        working-directory: back
        run: mvn clean verify --batch-mode --update-snapshots

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v5.1.0
        with:
          projectBaseDir: back
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_BACK }}

  publish-docker-images:
    runs-on: ubuntu-latest
    needs: sonarqube-scan
    steps:

      - name: Check out repository code
        uses: actions/checkout@v4.2.2

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push back-end image
        uses: docker/build-push-action@v6
        with:
          context: back
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/bobapp-back:latest