name: Test & Deploy BobApp
run-name: ${{ github.actor }} is building and testing the back-end

on:
  push:
    branches:
    - 'main'
  workflow_dispatch:

jobs:

  build-and-test:
    runs-on: ubuntu-latest
    steps:

      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          path: ${{ github.workspace }}

      - name: setup backend
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          architecture: x64
          cache: maven

      - name: test backend
        working-directory: ./back
        run: mvn --batch-mode --update-snapshots clean verify

      - name: setup frontend
        uses: actions/setup-node@v4
        with:
          cache-dependency-path: front/package-lock.json
          node-version: '16'
          cache: 'npm'

      - name: test frontend
        working-directory: ./front
        run: |
          npm install
          npm run test

      # - name: SonarCloud Scan
      #   uses: SonarSource/sonarcloud-github-action@master
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  deploy-docker-images:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:

      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          path: ${{ github.workspace }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push front-end image
        uses: docker/build-push-action@v6
        with:
          context: front
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/bobapp-front:latest

      - name: Build and push back-end image
        uses: docker/build-push-action@v6
        with:
          context: back
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/bobapp-back:latest